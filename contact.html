<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Petopia - Contact</title>
</head>
<body>

  <nav class="navbar background">
    <div class="logo">
      <img src="IMG/bmg2.jpg" alt="logo">
    </div>
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="product.html">Products</a></li>
      <li><a href="order.html">Orders</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="rightNav">
      <input type="text" name="search" id="search">
      <button class="btn btn-sm">Search</button>
    </div>
  </nav>

  <section class="background ocean-banner">
    <div class="page-box">
      <h1 class="text_big">Get in Touch</h1>
      <p class="text_small" style="margin-bottom:24px">Write your issue, if any</p>

      <form class="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your Name: Ayush">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your gmail: name@gmail.com">

        <label for="msg">Message</label>
        <textarea id="msg" rows="5" placeholder="What you want to Ask"></textarea>

        <button type="submit" class="btn">Send</button>
      </form>

      <div class="contact-info">
        <p>Address: Noida,Uttar Pradesh,India</p>
        <p>PhoneNo: +91 98765 43210</p>
        <p>support@petopia.in</p>
      </div>
    </div>
  </section>

</body>
</html>
